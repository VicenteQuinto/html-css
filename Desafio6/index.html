<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Tag em HTML - 06</title>
    <style>
        body{
            font: normal 14pt arial;
            background-color: rgb(157, 157, 158);
        }
    </style>

<body>
    <h1>Tags em HTML</h1>
    <p><strong>Em HTML5</strong>, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual a tag deverá utilizar em cada caso</p>
    
    <ul type="square">
        <li><abbr title="Use a tag <p>">Parágrafo </abbr></li>
        <li><abbr title="Use a tag h1">Titulos</abbr></li>
        <li><abbr title="Use a tag img">Imagens</abbr></li>
        <li><abbr title="Use a tag abbr">Abreviações</abbr></li>
        <li><abbr title="Use a tag num">Condigos-Fonte</abbr></li>        
        <li><abbr title="Use a tag ol">Listas numeradas</abbr></li>
        <li><abbr title="Use a tag li">Listas com demarcadores</abbr></li>                
       
    </ul>
    
</body>
