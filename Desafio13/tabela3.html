<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 13 - Tabela 3</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;

        }
        table{
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            width: 700px;
            
        }

        thead tr,th:nth-child(even){
            background-color: rgb(41, 41, 41);
            color: white;

        }
        tr.media1:nth-child(odd){
            background-color: rgb(41, 41, 41);

        }
        tr.media2:nth-child(even){
            background-color: rgb(41, 41, 41);

        }

        tr,th, td{
            border: 1px solid black;
            padding: 10px;
        }
        tr.media1,.media2{
            font-weight: bold;
            color: white;
        }
        td.zero{
            text-align: center;
    
        }
      
    </style>
</head>
<body>
<table>
    <thead>
        <tr>
        <th rowspan="2" >Área</th>
        <th rowspan="2">Disciplina</th>
        <th colspan="2" scope="colgroup">Notas</th>
        <th rowspan="2">Média</th>
    </tr>
    <tr>
        <th scope="col">Nota 1</th>
        <th scope="col">Nota 2</th>
    </tr>
    </thead>
    <tbody>
        <th rowspan="4">Exatas</th>
        <td>Matemática</td>
        <td class=zero>0.0</td>
        <td class=zero>0.0</td>
        <td class=zero>0.0</td>

        <tr>
            <td>Física</td>
            <td class=zero>0.0</td>
            <td class=zero>0.0</td>
            <td class=zero>0.0</td>
        </tr>
        <tr>
            <td>Química</td>
            <td class=zero>0.0</td>
            <td class=zero>0.0</td>
            <td class=zero>0.0</td>
        </tr>

        <tr>
            <td>Biologia</td>
            <td class=zero>0.0</td>
            <td class=zero>0.0</td>
            <td class=zero>0.0</td>
        </tr>
        <tr class="media1">
            <td colspan="4">Média Exatas</td>
            <td class=zero>0.0</td>
        </tr>

        <th rowspan="2">Humanas</th>
        <td>História</td>
        <td class=zero>0.0</td>
        <td class=zero>0.0</td>
        <td class=zero>0.0</td>

        <tr>
            <td>Geografia</td>
            <td class=zero>0.0</td>
            <td class=zero>0.0</td>
            <td class=zero>0.0</td>
        </tr>
        <tr class="media2">
            <td colspan="4">Média Humanas</td>
            <td class=zero>0.0</td>
        </tr>
    </tbody>
</table>
</body>
</html>
