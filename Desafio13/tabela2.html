<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construção da Tabela - Desafio 13 - Tabela 2</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            width: 1000px;
        }
        table{
            width: 200px;
            height: 200px;
            border-collapse: collapse;
            background-color: yellow;
        }
        td{
            border: 1px solid black;
            text-align: center;
            vertical-align: middle;
        }


    </style>
</head>
<body>
    <h1>Desafio 13 - Tabela 2</h1>
    <table>
        <tr>
            <td colspan="4">A</td>
            <td rowspan="5">B</td>

            <tr>
                <td rowspan="5">C</td>
            </tr>
            <tr>
                <td>D</td>
                <td>E</td>
                <td>F</td>
            </tr>
            <td>G</td>
            <td>H</td>
            <td>I</td>
            <tr>
                <td>J</td>
                <td>L</td>
                <td>M</td>
            </tr>

            <tr>
                <td colspan="4">N</td>
            </tr>
        </tr>

    </table>
    
</body>
</html>
