<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        *{/*Configurações globais da CSS*/
            height: 100%;

        }
        body{
            /*background-color: rgb(80, 200, 236);Não vamos usar esse padrao de cor*/
            background-image: linear-gradient(to bottom, #4fffdc, #3fccb0, #3d8577);/*Configura o fundo em gradiente. Para mudar o angulo do gradiente pode colocar a tag 45deg. Pode colocar também porcentagem na frente da cor*/
            background-attachment: fixed;/*Deixa o fundo fixo mesmo que tenha barra de rolagem*/

        }
    </style>
</head>
<body>
    <h1>Testando Gradiente</h1>
    
</body>
</html>
