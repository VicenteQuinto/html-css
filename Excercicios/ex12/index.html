<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Este video esta hospedado no meu proprio servidor.</p>
    <!--<video src="midia/musica.ogv" width="500" controls></video>-->
    <video width="500" poster="imagem/capa.jfif" controls autoplay loop>
        <source src="midia/musica.mp4" type="video/mp4">
        <source src="midia/musica.m4v" type="video/mp4">
        <source src="midia/musica.webm" type="video/webm">
        <source src="midia/musica.ogv" type="video/ogg">
        <p>Seu navegador não tem compatilidade com reprodução de videos.</p>
        
    </video>
    <h1>Inserindo videos do Youtube</h1>
    <iframe width="500" height="315" src="https://www.youtube.com/embed/zrIfhUVB_3o" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>

</body>
</html>
