<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        bod{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            border-collapse: collapse;
            width: 300px;
        }


        td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Mesclagem de Celulas</h1>
    <table>
    <tr>
        <td>A</td>
        <td colspan="2">B</td> <!--Faz a celula B ocupar as 2 colunas da direita-->
        <!--<td>C</td>-->
    </tr>
    <tr>
        <td rowspan="3">D</td> <!--Faz a celula D ocupar as 3 linhas abaixo -->
        <td >E</td>
        <td rowspan="2">F</td>
    </tr>
    <tr>
        <!--<td>G</td>-->
        <td>H</td>
        <!--<td>I</td>-->
    </tr>
    <tr>
        <!--<td>J</td-->
        <td colspan="2">L</td>
        <!--<td>M</td>-->
    </tr>
    </table>
    
</body>
</html>
