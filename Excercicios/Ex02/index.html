<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebras de linha</h1>
    <hr> <!--Acrescenta uma linha vertical-->
    <p>Você pode escreve um parágrafo de qualquer jeito. <br>
        Basta colocar tudo no meio do par de tags &lt;'p'&gt; e &lt;'/p'&gt;
    </p>
    <p>Vamos adicionar alguns simbolos especiais:
        &reg;
        &copy;
        &trade;
        &euro;
        &pound;
        &yen;
        &cent;
        &Delta;
    </p>
    <p>Vamos adicionar alguns emojis:
        &#x1F596; <!--O codigo para colocar os emojis é &#x-->
        &#x1F913;
    </p>

        <!--br quebra a linha de texto-->
        <!--&lt simbolo maior quê-->
        <!--&gt simbolo menor quê-->
</body>
</html>
