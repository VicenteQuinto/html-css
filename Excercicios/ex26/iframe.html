<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de Iframe</title>
    <style>
        iframe{
            width: 400px;
            height: 500px;
            border: 10px solid black;
        }
    </style>
</head>
<body>
    <h1>Testando o uso de Iframe</h1>
    <!--Isso aqui em baixo é o normal que já sabemos-->
    <p>Acessando o site do <a href="https://www.cursoemvideo.com/" target="_blank">curso em video</a> para aprender a programar</p><br>

    <!--Vamos fazer um iframe-->
     <!--Por padrão o tamanho do iframe é 300x150px-->
    <p>Acessando o site do <iframe src="https://www.cursoemvideo.com/" target="_blank" frameborder="0" height="500" width="500" scolling="auto">
    </iframe> para aprender a programar</p><br>

    <p>O repositorio do Guanabara <iframe src="https://gustavoguanabara.github.io/" target="_blank" frameborder="0"></iframe> também é bem legal!</p>


    
</body>
</html>
