<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina Teste</title>
    <style>

    
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            padding: 10px;
            border-collapse: collapse;
            
        }
        caption{
            font-weight: bold;
            padding-bottom: 10px;
        }
        th{
            text-align: center;
        }
        td{
            text-align: left;
        }
        th,td{
            border: 1px solid black;
            
            padding: 10px;
        }
        tbody{
            padding: 10px;
        }
        col.cnome{
            background-color: chartreuse;
        }
        col.csexo{
            background-color: aqua;

        }
        col.cprofissao, idade{
            background-color: blue;
        }


    </style>
</head>
<body>
    <h1>Exercícios de Tabela</h1>
    <table>
        <!--Seleciona a coluna inteira para configura-la-->
        <colgroup>
        <col class="cnome">
        <col class="csexo">
        <!--<col class="csexo">-->
        <col class="cprofissao" span="2"><!--Esse span serve para configura a quantidade de colunas, no caso as cores-->    
        </colgroup>
    <caption>Cadastro</caption>
    
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        
    <tbody>
            <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
            </tr>
            <tr>
            <td>Cláudio</td>
            <td>M</td>
            <td>28</td>
            <td>Programador</td>
            </tr>
            <td>Gustavo</td>
            <td>M</td>
            <td>42</td>
            <td>Professor</td>
            </tr>
            <td>Hélio</td>
            <td>M</td>
            <td>19</td>
            <td>Vendedor</td>
            </tr>
            <td>Maria</td>
            <td>F</td>
            <td>39</td>
            <td>Médica</td>
            </tr>
            <td>Otávio</td>
            <td>M</td>
            <td>22</td>
            <td>Nutricionista</td>
            </tr>  
    </table>
    
</body>
</html>
